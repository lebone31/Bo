<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candle</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* CENTER WRAP */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BIG CANDLE */
.candle {
    width: 80px;
    height: 280px;
    background: linear-gradient(#fff, #dcdcdc);
    border-radius: 18px;
    position: relative;
    box-shadow: 0 0 40px rgba(255,255,255,0.25);
}

/* FLAME */
.flame {
    width: 32px;
    height: 32px;
    background: radial-gradient(circle, #fff7a0, orange, red);
    border-radius: 50%;
    position: absolute;
    top: -45px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 25px orange;
    animation: flicker 0.15s infinite alternate;
}

@keyframes flicker {
    from { transform: translateX(-50%) scale(1); }
    to { transform: translateX(-50%) scale(1.2); }
}

/* BALLOONS */
.balloon {
    position: absolute;
    bottom: -120px;
    width: 25px;
    height: 35px;
    border-radius: 50%;
    opacity: 0.9;
    animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
    to {
        transform: translateY(-130vh);
    }
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: black;
    padding: 25px 35px;
    border-radius: 16px;
    font-size: 22px;
    display: none;
    z-index: 10;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="candle">
        <div class="flame" id="flame"></div>
    </div>
</div>

<div class="popup" id="popup">🎂 Blow the candle to make a wish 🎂</div>

<script>
let flame = document.getElementById("flame");
let popup = document.getElementById("popup");
let blown = false;

/* SHOW START POPUP */
popup.style.display = "block";
setTimeout(() => popup.style.display = "none", 2500);

/* LOTS OF BALLOONS */
function balloonsBurst() {
    for (let i = 0; i < 40; i++) {
        let b = document.createElement("div");
        b.className = "balloon";

        b.style.left = Math.random() * 100 + "vw";
        b.style.background = 
            ["red","blue","yellow","green","purple","orange","pink"][Math.floor(Math.random()*7)];

        b.style.animationDuration = (Math.random() * 4 + 4) + "s";

        document.body.appendChild(b);

        setTimeout(() => b.remove(), 8000);
    }
}

/* MIC BLOW */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const audioContext = new AudioContext();
    const mic = audioContext.createMediaStreamSource(stream);

    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;

    mic.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    function detect() {
        analyser.getByteTimeDomainData(data);

        let sum = 0;
        for (let i = 0; i < data.length; i++) {
            let v = data[i] - 128;
            sum += v * v;
        }

        let volume = Math.sqrt(sum / data.length);

        if (volume > 12 && !blown) {
            blown = true;

            flame.style.display = "none";
            balloonsBurst();

            popup.innerText = "✨ Make a Wish ✨";
            popup.style.display = "block";

            setTimeout(() => {
                popup.style.display = "none";
            }, 3000);
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(() => {
    alert("Please allow microphone access to blow the candle.");
});
</script>

</body>
</html>
